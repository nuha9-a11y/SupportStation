<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إنشاء بلاغ جديد</title>
  <link rel="stylesheet" href="style_report.css">
</head>
<body>

<div class="header">إنشاء بلاغ جديد</div>

<div class="container" style="margin-top:40px;">
  <div class="card">

    <label>نوع البلاغ</label>

    <div class="custom-select" onclick="toggleDropdown()">
      <div id="selectedOption">صيانة</div>
      <ul id="optionsList" class="options">
        <li onclick="selectOption('صيانة',event)">صيانة</li>
        <li onclick="selectOption('نظافة',event)">نظافة</li>
        <li onclick="selectOption('حماية الحقوق',event)">حماية الحقوق</li>
      </ul>
    </div>

    <input type="hidden" id="type" value="صيانة">

    <div id="rightsNote" class="rights-note" style="display:none;">
      يتم تحويل البلاغ مباشرة إلى المسؤول المختص مع المحافظة على سرية المعالجة.
    </div>

    <div id="rightsGuideBox" class="rights-guide-box" style="display:none;">
      <span>اطلع على حقوقك قبل الإبلاغ</span>
      <button type="button" class="rights-btn" onclick="goToRights()">الحقوق</button>
    </div>

    <br><br>

    <label>شدة البلاغ: <span id="rateValue">1</span> / 10</label>
    <input type="range" id="rate" min="1" max="10" value="1" oninput="updateRate()">

    <div id="locationField">
      <label id="locationLabel">الموقع</label>
      <input type="text" id="location" placeholder="مثال: مبنى A - قاعة 3">
    </div>

    <label>الوصف</label>
    <textarea id="desc" placeholder="اكتبي تفاصيل البلاغ"></textarea>

    <button class="primary" onclick="saveReport()">إرسال البلاغ</button>
    <button class="light" onclick="window.location.href='student_main_page.html'">رجوع</button>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
function getClient() {
  return window.supabase.createClient(
    'https://mcxdjisoyqdnyieboqpy.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jeGRqaXNveXFkbnlpZWJvcXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDI3NDAsImV4cCI6MjA5MDk3ODc0MH0.kIwJ1pc-GLX1lTvstLSDZ5Li1rd9vwutI4-Wz_HR6nE'
  );
}

function toggleDropdown() {
  const list = document.getElementById("optionsList");
  list.style.display = list.style.display === "block" ? "none" : "block";
}

function selectOption(value, event) {
  event.stopPropagation();
  document.getElementById("selectedOption").innerText = value;
  document.getElementById("type").value = value;
  document.getElementById("optionsList").style.display = "none";
  toggleFields();
}

function toggleFields(){
  const type = document.getElementById("type").value;
  const note = document.getElementById("rightsNote");
  const guideBox = document.getElementById("rightsGuideBox");
  const label = document.getElementById("locationLabel");
  const locationInput = document.getElementById("location");

  if(type === "حماية الحقوق"){
    note.style.display = "block";
    guideBox.style.display = "flex";
    label.innerText = "الجهة المرتبطة بالبلاغ";
    locationInput.placeholder = "مثال: القسم أو الجهة أو الموقع المرتبط بالبلاغ";
  } else {
    note.style.display = "none";
    guideBox.style.display = "none";
    label.innerText = "الموقع";
    locationInput.placeholder = "مثال: مبنى A - قاعة 3";
  }
}

function updateRate(){
  document.getElementById("rateValue").innerText = document.getElementById("rate").value;
}

function goToRights() {
  window.location.href = "trainee_rights.html";
}

async function saveReport(){
  const type = document.getElementById("type").value;
  const location = document.getElementById("location").value.trim();
  const desc = document.getElementById("desc").value.trim();
  const rate = document.getElementById("rate").value;

  const senderName = localStorage.getItem("userName");
  const senderEmail = localStorage.getItem("user_email");
  const senderRole = localStorage.getItem("user_role");

  if (!senderEmail) {
    alert("لازم تسجل دخول أول");
    return;
  }

  if(location === ""){
    alert("الرجاء تعبئة الموقع");
    return;
  }

  if(desc === ""){
    alert("الرجاء كتابة وصف البلاغ");
    return;
  }

  try {  // ✅ هنا الحل

    const supabase = getClient();

    const { error } = await supabase
      .from("reports")
      .insert([
        {
          type: type,
          description: desc,
          location: location,
          rate: parseInt(rate),
          status: "قيد المراجعة",
          sender_name: senderName || "-",
          sender_email: senderEmail,
          sender_role: senderRole || "trainee"
        }
      ]);

    if (error) {
      alert("خطأ: " + error.message);
      return;
    }

    alert("تم إرسال البلاغ بنجاح");
    window.location.href = "student_main_page.html";

  } catch (e) {  // ✅ الآن صح
    alert("صار خطأ: " + e.message);
  }
}
document.addEventListener("click", function(e) {
  const list = document.getElementById("optionsList");
  const select = document.querySelector(".custom-select");

  if (select && !select.contains(e.target)) {
    list.style.display = "none";
  }
});

toggleFields();
updateRate();
</script>

<footer class="main-footer">
  <div class="footer-content">
    <p>&copy; 2026 حقوق محفوظة | محطة الدعم </p>
    <ul class="footer-links">
      <li><a href="index.html">الرئيسية</a></li>
      <li><a href="#">عن الموقع</a></li>
      <li><a href="mailto:example@example.com">اتصل بنا</a></li>
    </ul>
  </div>
</footer>

</body>
</html>
