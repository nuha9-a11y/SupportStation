<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>لوحة تحكم المسؤول</title>
  <link rel="stylesheet" href="adminStyles.css" />
</head>

<body class="admin-body" style="display:flex; flex-direction:column; min-height:100vh;">

<header class="admin-header">
  <div class="admin-left">
    <img src="img/logo.png" class="admin-logo" alt="Logo">
    <div class="admin-title">
      <h1>لوحة تحكم المسؤول</h1>
      <span>محطة الدعم</span>
    </div>
  </div>
  <a href="index.html" class="logout">تسجيل الخروج</a>
</header>

<main class="admin-main" style="flex:1;">

  <!-- ===== Stats ===== -->
  <div class="admin-cards" style="margin-top:100px;">
    <button class="stat-card stat-click active" data-filter="all" onclick="setFilter('all')">
      <h3>إجمالي البلاغات</h3>
      <p id="countAll">0</p>
    </button>

    <button class="stat-card stat-click" data-filter="processing" onclick="setFilter('processing')">
      <h3>قيد التنفيذ</h3>
      <p id="countProcessing">0</p>
    </button>

    <button class="stat-card stat-click" data-filter="done" onclick="setFilter('done')">
      <h3>تم الحل</h3>
      <p id="countDone">0</p>
    </button>
  </div>

  <!-- Trainers -->
  <section class="reports-section">
    <h2 class="section-title">بلاغات المدربين</h2>
    <div class="reports-box">
      <div class="reports-scroll" id="trainerList"></div>
    </div>
  </section>

  <!-- Trainees -->
  <section class="reports-section">
    <h2 class="section-title">بلاغات المتدربين</h2>
    <div class="reports-box">
      <div class="reports-scroll" id="traineeList"></div>
    </div>
  </section>

</main>

<script>
let currentFilter = "all";

function setFilter(filter){
  currentFilter = filter;
  document.querySelectorAll(".stat-click").forEach(b=>{
    b.classList.toggle("active", b.dataset.filter === filter);
  });
  applyFilter();
}

function applyFilter(){
  const cards = document.querySelectorAll(".report-card");

  cards.forEach(card=>{
    const s = card.dataset.status;

    if(currentFilter === "all"){
      card.style.display = (s === "processing") ? "" : "none";
    }
    else if(currentFilter === "processing"){
      card.style.display = (s === "running") ? "" : "none";
    }
    else if(currentFilter === "done"){
      card.style.display = (s === "done") ? "" : "none";
    }
  });

  updateCounts();
}

function updateCounts(){
  const cards = document.querySelectorAll(".report-card");
  let total=0, processing=0, done=0;

  cards.forEach(card=>{
    const status = card.dataset.status;

    // إجمالي البلاغات = قيد المراجعة فقط
    if(status === "processing") total++;

    // قيد التنفيذ = running فقط
    if(status === "running") processing++;

    // تم الحل
    if(status === "done") done++;
  });

  document.getElementById("countAll").textContent = total;
  document.getElementById("countProcessing").textContent = processing;
  document.getElementById("countDone").textContent = done;
}

function deleteOldReports() {
  const now = Date.now();
  const fiveMinutes = 5 * 60 * 1000;

  let trainer = JSON.parse(localStorage.getItem("teacherReport")) || [];
  trainer = trainer.filter(r => !(r.status === "done" && r.solvedAt && (now - r.solvedAt) >= fiveMinutes));
  localStorage.setItem("teacherReport", JSON.stringify(trainer));

  let trainee = JSON.parse(localStorage.getItem("traineeReports")) || [];
  trainee = trainee.filter(r => !(r.status === "done" && r.solvedAt && (now - r.solvedAt) >= fiveMinutes));
  localStorage.setItem("traineeReports", JSON.stringify(trainee));
}

function loadReports() {

  // 1) نقل البلاغات القديمة
  let old = JSON.parse(localStorage.getItem("studentreports"));
  if(old){
    localStorage.setItem("traineeReports", JSON.stringify(old));
    localStorage.removeItem("studentreports");
  }

  deleteOldReports();

  // 2) تحميل البلاغات
  let trainerReports = JSON.parse(localStorage.getItem("teacherReport")) || [];
  let traineeReports = JSON.parse(localStorage.getItem("traineeReports")) || [];

  // 3) تحويل الحالات القديمة
  function normalizeStatus(r){
    if(r.status === "قيد المراجعة") r.status = "processing";
    if(r.status === "قيد التنفيذ") r.status = "running";
    if(r.status === "تم الحل") r.status = "done";
    return r;
  }

  trainerReports = trainerReports.map(normalizeStatus);
  traineeReports = traineeReports.map(normalizeStatus);

  localStorage.setItem("teacherReport", JSON.stringify(trainerReports));
  localStorage.setItem("traineeReports", JSON.stringify(traineeReports));

  // 4) عرض البلاغات
  const trainerBox = document.getElementById("trainerList");
  const traineeBox = document.getElementById("traineeList");

  trainerBox.innerHTML = "";
  traineeBox.innerHTML = "";

  if (trainerReports.length === 0) {
    trainerBox.innerHTML = `<p style="text-align:center; padding:20px; color:#777;">لا توجد بلاغات</p>`;
  } else {
    trainerReports.forEach(r => trainerBox.innerHTML += createReportCard(r));
  }

  if (traineeReports.length === 0) {
    traineeBox.innerHTML = `<p style="text-align:center; padding:20px; color:#777;">لا توجد بلاغات</p>`;
  } else {
    traineeReports.forEach(r => traineeBox.innerHTML += createReportCard(r));
  }

  applyFilter();
}

function createReportCard(r){
  let statusText =
    r.status === "processing" ? "قيد المراجعة" :
    r.status === "running" ? "قيد التنفيذ" :
    "تم الحل";

  return `
    <div class="report-card" data-status="${r.status}">
      <h3>#${r.id} - ${r.type}</h3>
      <p><b>الوصف:</b> ${r.desc}</p>
      <p><b>الموقع:</b> ${r.location || "-"}</p>

      <span class="status-tag">${statusText}</span>

      <button class="btn-process" onclick="openReport('${r.id}')">عرض البلاغ</button>
    </div>
  `;
}

function openReport(id){
  localStorage.setItem("adminSelectedReport", id);
  window.location.href = "admin_report.html";
}

loadReports();
</script>

<footer class="main-footer">
  <div class="footer-content">
      <p>&copy; 2026 حقوق محفوظة | محطة الدعم</p>
  </div>
</footer>

</body>
</html>
