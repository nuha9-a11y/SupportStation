<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تفاصيل البلاغ</title>
  <link rel="stylesheet" href="style_report.css">
</head>

<body>

<div class="header">تفاصيل البلاغ</div>

<div class="container" style="margin-top:200px;">
  <div class="card">
    <div id="details">جاري التحميل...</div>

    <button class="light" id="deleteBtn" onclick="deleteReport()" style="background:#ffdddd; color:#b30000;">حذف البلاغ</button>
    <button class="light" onclick="window.location.href='student_main_page.html'">رجوع</button>
  </div> 
</div>

<script type="module">
  import { supabase } from "./supabase.js";

  const details = document.getElementById("details");
  const deleteBtn = document.getElementById("deleteBtn");
  const reportId = localStorage.getItem("selectedReportId");

  function getStatusText(status) {
    if (status === "processing" || status === "قيد المراجعة") return "قيد المراجعة";
    if (status === "running" || status === "تحت التنفيذ" || status === "قيد التنفيذ" || status === "قيد المعالجة") return "تحت التنفيذ";
    if (status === "done" || status === "تم الحل" || status === "تم التنفيذ") return "تم الحل";
    return status || "غير معروف";
  }

  async function loadReport() {
    if (!reportId) {
      details.innerHTML = "<p>❌ لم يتم اختيار بلاغ.</p>";
      setTimeout(() => {
        window.location.href = "student_main_page.html";
      }, 1500);
      return;
    }

    try {
      const { data, error } = await supabase
        .from("reports")
        .select("*")
        .eq("id", reportId)
        .single();

      if (error || !data) {
        details.innerHTML = "<p>❌ لم يتم العثور على البلاغ.</p>";
        return;
      }

      const statusText = getStatusText(data.status);

      details.innerHTML = `
        <p><b>رقم البلاغ:</b> #${data.id}</p>
        <p><b>النوع:</b> ${data.type || "-"}</p>
        <p><b>الموقع:</b> ${data.location || "-"}</p>
        <p><b>الوصف:</b> ${data.description || "-"}</p>
        <p><b>الحالة:</b> ${statusText}</p>
        <p><b>التقييم:</b> ${data.rate ? data.rate + "/10" : "لم يتم التقييم بعد"}</p>
      `;
    } catch (e) {
      details.innerHTML = "<p>❌ حدث خطأ أثناء تحميل البلاغ.</p>";
      console.error(e);
    }
  }

  async function deleteReport() {
    if (!reportId) {
      alert("لم يتم العثور على رقم البلاغ");
      return;
    }

    if (!confirm("هل أنتِ متأكدة من حذف البلاغ؟")) return;

    deleteBtn.disabled = true;
    deleteBtn.innerText = "جاري الحذف...";

    try {
      const { error } = await supabase
        .from("reports")
        .delete()
        .eq("id", reportId);

      if (error) {
        alert("حدث خطأ أثناء الحذف");
        deleteBtn.disabled = false;
        deleteBtn.innerText = "حذف البلاغ";
        return;
      }

      localStorage.removeItem("selectedReportId");
      alert("تم حذف البلاغ بنجاح");
      window.location.href = "student_main_page.html";
    } catch (e) {
      alert("حدث خطأ أثناء الحذف");
      deleteBtn.disabled = false;
      deleteBtn.innerText = "حذف البلاغ";
      console.error(e);
    }
  }

  window.deleteReport = deleteReport;

  loadReport();
</script>

<footer class="main-footer">
  <div class="footer-content">
    <p>&copy; 2026 حقوق محفوظة | محطة الدعم </p>

    <ul class="footer-links">
      <li><a href="index.html">الرئيسية</a></li>
      <li><a href="about.html">عن الموقع</a></li>
    </ul>
  </div>
</footer>

</body>
</html>
