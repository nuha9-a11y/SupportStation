<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تفاصيل البلاغ</title>
  <link rel="stylesheet" href="style_report.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="header">تفاصيل البلاغ</div>

<div class="container" style="margin-top:200px;">
  <div class="card">
    <div id="details">جاري التحميل...</div>

    <button class="light" onclick="deleteReport()" style="background:#ffdddd; color:#b30000;">حذف البلاغ</button>
    <button class="light" onclick="window.location.href='student_main_page.html'">رجوع</button>
  </div> 
</div>

<script type="module">
    import { supabase } from "./supabase.js";
    // ضعي هنا كل كود الصفحة
/* إنشاء عميل Supabase */
const supabase = window.supabase.createClient(
  'https://mcxdjisoyqdnyieboqpy.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jeGRqaXNveXFkbnlpZWJvcXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDI3NDAsImV4cCI6MjA5MDk3ODc0MH0.kIwJ1pc-GLX1lTvstLSDZ5Li1rd9vwutI4-Wz_HR6nE'
);

const details = document.getElementById("details");

/* قراءة ID البلاغ */
const reportId = localStorage.getItem("selectedReportId");

if (!reportId) {
  details.innerHTML = "<p>❌ لم يتم اختيار بلاغ.</p>";
  return; // مهم جداً حتى لا يستمر التحميل
}

/* تحميل بيانات البلاغ */
async function loadReport() {
  const { data, error } = await supabase
    .from("reports")
    .select("*")
    .eq("id", reportId)
    .single();

  if (error || !data) {
    details.innerHTML = "<p>❌ لم يتم العثور على البلاغ.</p>";
    return;
  }

  let statusText =
    data.status === "processing" ? "قيد المراجعة" :
    data.status === "running" ? "تحت التنفيذ" :
    data.status === "done" ? "تم الحل" :
    data.status;

  details.innerHTML = `
    <p><b>رقم البلاغ:</b> #${data.id}</p>
    <p><b>النوع:</b> ${data.type}</p>
    <p><b>الموقع:</b> ${data.location || "-"}</p>
    <p><b>الوصف:</b> ${data.description}</p>
    <p><b>الحالة:</b> ${statusText}</p>
    <p><b>التقييم:</b> ${data.rate}/10</p>
  `;
}

/* حذف البلاغ */
async function deleteReport() {
  if (!confirm("هل أنتِ متأكدة من حذف البلاغ؟")) return;

  const { error } = await supabase
    .from("reports")
    .delete()
    .eq("id", reportId);

  if (error) {
    alert("حدث خطأ أثناء الحذف");
    return;
  }

  alert("تم حذف البلاغ بنجاح");
  window.location.href = "student_main_page.html";
}

loadReport();
</script>

<footer class="main-footer">
    <div class="footer-content">
        <p>&copy; 2026 حقوق محفوظة | محطة الدعم </p>

        <ul class="footer-links">
            <li><a href="index.html">الرئيسية</a></li>
            <li><a href="about.html">عن الموقع</a></li>
        </ul>
    </div>
</footer>
</body>
</html>
