<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>عرض البلاغ</title>
  <link rel="stylesheet" href="style_report.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="header">عرض البلاغ</div>

<div class="container" style="margin-top:80px;">
  <div class="card" id="reportCard">

    <h3 id="r_id"></h3>

    <p><b>نوع البلاغ:</b> <span id="r_type"></span></p>
    <p><b>الوصف:</b> <span id="r_desc"></span></p>
    <p><b>الموقع:</b> <span id="r_location"></span></p>
    <p><b>شدة البلاغ:</b> <span id="r_rate"></span></p>
    <p><b>مقدم البلاغ:</b> <span id="r_name"></span></p>
    <p><b>الإيميل:</b> <span id="r_email"></span></p>
    <p><b>الدور:</b> <span id="r_role"></span></p>

    <!-- ✅ إضافة الصورة -->
    <div id="reportImageBox" style="display:none; margin-top:20px;">
      <p><b>الصورة المرفقة:</b></p>
      <img id="r_image" src="" alt="صورة البلاغ"
           style="max-width:100%; width:300px; border-radius:12px; border:1px solid #ddd;">
    </div>

    <br>

    <label><b>الحالة الحالية:</b></label>

    <div class="custom-select" onclick="toggleDropdownStatus()">
      <div id="selectedStatus">قيد المراجعة</div>

      <ul id="statusOptions" class="options">
        <li onclick="selectStatus('قيد المراجعة', event)">قيد المراجعة</li>
        <li onclick="selectStatus('تم التنفيذ', event)">تم التنفيذ</li>
      </ul>
    </div>

    <br>

    <input type="hidden" id="statusValue">

    <button class="primary" onclick="saveStatus()">حفظ الحالة</button>

    <div style="display:flex; justify-content:space-between; margin-top:20px;">
      <button class="light" onclick="window.location.href='admin.html'">رجوع</button>

      <button class="danger" onclick="deleteReport()" style="background:#d9534f; color:white;">
        حذف البلاغ
      </button>
    </div>

  </div>
</div>

<script>
function getClient(){
  return window.supabase.createClient(
    'https://mcxdjisoyqdnyieboqpy.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jeGRqaXNveXFkbnlpZWJvcXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MDI3NDAsImV4cCI6MjA5MDk3ODc0MH0.kIwJ1pc-GLX1lTvstLSDZ5Li1rd9vwutI4-Wz_HR6nE'
  );
}

let selectedId = localStorage.getItem("adminSelectedReport");
let currentReport = null;

async function loadReport(){
  if(!selectedId){
    alert("لم يتم تحديد البلاغ");
    window.location.href = "admin.html";
    return;
  }

  const supabase = getClient();

  const { data, error } = await supabase
    .from("reports")
    .select("*")
    .eq("id", selectedId)
    .single();

  if(error || !data){
    alert("تعذر تحميل البلاغ");
    window.location.href = "admin.html";
    return;
  }

  currentReport = data;

  document.getElementById("r_id").innerText = "بلاغ #" + data.id;
  document.getElementById("r_type").innerText = data.type || "-";
  document.getElementById("r_desc").innerText = data.description || "-";
  document.getElementById("r_location").innerText = data.location || "-";
  document.getElementById("r_rate").innerText = data.rate || "-";
  document.getElementById("r_name").innerText = data.sender_name || "-";
  document.getElementById("r_email").innerText = data.sender_email || "-";
  document.getElementById("r_role").innerText = data.sender_role || "-";

  const status = data.status || "قيد المراجعة";

  document.getElementById("selectedStatus").innerText = status;
  document.getElementById("statusValue").value = status;

  /* ✅ عرض الصورة إذا موجودة */
  if (data.image_url) {
    document.getElementById("reportImageBox").style.display = "block";
    document.getElementById("r_image").src = data.image_url;
  }
}

function toggleDropdownStatus() {
  const list = document.getElementById("statusOptions");
  list.style.display = list.style.display === "block" ? "none" : "block";
}

function selectStatus(value, event) {
  event.stopPropagation();
  document.getElementById("selectedStatus").innerText = value;
  document.getElementById("statusValue").value = value;
  document.getElementById("statusOptions").style.display = "none";
}

document.addEventListener("click", function(e){
  const list = document.getElementById("statusOptions");
  const select = document.querySelector(".custom-select");
  if(select && !select.contains(e.target)){
    list.style.display = "none";
  }
});

async function saveStatus(){
  const newStatus = document.getElementById("statusValue").value;
  const supabase = getClient();

  const { error } = await supabase
    .from("reports")
    .update({ status: newStatus })
    .eq("id", selectedId);

  if(error){
    alert("حدث خطأ في تحديث الحالة");
    return;
  }

  alert("تم تحديث حالة البلاغ");
  window.location.href = "admin.html";
}

async function deleteReport() {
  if(!confirm("هل أنت متأكد؟")) return;

  const supabase = getClient();

  const { error } = await supabase
    .from("reports")
    .delete()
    .eq("id", selectedId);

  if(error){
    alert("حدث خطأ أثناء الحذف");
    return;
  }

  alert("تم حذف البلاغ");
  window.location.href = "admin.html";
}

loadReport();
</script>

</body>
</html>
